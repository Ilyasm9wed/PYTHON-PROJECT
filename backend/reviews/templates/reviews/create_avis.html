{% extends 'base/base.html' %}

{% block title %}Donner un avis{% endblock %}

{% block content %}
<h1 class="mb-4">Donner un avis</h1>

<form method="post">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Note (1-5)</label>
    <select name="note" class="form-select" required>
      <option value="1">1 étoile</option>
      <option value="2">2 étoiles</option>
      <option value="3">3 étoiles</option>
      <option value="4">4 étoiles</option>
      <option value="5">5 étoiles</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Commentaire</label>
    <textarea name="commentaire" class="form-control" rows="4" required></textarea>
  </div>
  <button type="submit" class="btn btn-primary">Envoyer</button>
  <a href="{% url 'my_reservations' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
